<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Conrad's Ink Filler Logo</title>
  <desc id="desc">Gold crest style logo with CI initials and ornamental tattoo line accents on dark navy background.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172e"/>
      <stop offset="1" stop-color="#1f2f53"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3d16a"/>
      <stop offset="1" stop-color="#cda236"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#bg)"/>
  <rect x="8" y="8" width="112" height="112" rx="20" fill="none" stroke="url(#gold)" stroke-width="3"/>

  <path d="M24 46c9-18 24-28 40-28s31 10 40 28" fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  <path d="M24 82c9 18 24 28 40 28s31-10 40-28" fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>

  <path d="M28 64h72" stroke="url(#gold)" stroke-width="2" opacity="0.55"/>

  <text x="64" y="76" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="700" fill="url(#gold)" letter-spacing="2">CI</text>

  <path d="M22 36l8 5-8 5" fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M106 36l-8 5 8 5" fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M22 92l8-5-8-5" fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M106 92l-8-5 8-5" fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
